server:
  port: 8080
spring:
  application:
    name: openagent
  servlet:
    multipart:
      # 单文件 5MB；前端会先拦截，这里是兜底
      max-file-size: 5MB
      # 单次请求 30MB（最多 5 个 5MB 附件 + 富表单冗余）
      max-request-size: 30MB
  datasource:
    # 通过环境变量覆盖；本地不设环境变量则走默认值
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/openagent?stringtype=unspecified}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    default-encoding: UTF-8
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
  data:
    redis:
      connect-timeout: 15
      database: ${SPRING_DATA_REDIS_DATABASE:}
      host: ${SPRING_DATA_REDIS_HOST:}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 100
      port: ${SPRING_DATA_REDIS_PORT:6379}
      jedis:
        pool:
          enabled: true
          max-active: 5
          max-idle: 5
          min-idle: 0

langchain4j:
  community:
    dashscope:
      # 注意：ChatModel 在本项目走「自定义模型」机制（数据库 model 表 + DynamicChatModelServiceImpl
      # 动态构建 OpenAiChatModel），不依赖 starter 自动装配，因此这里不再配置 chat-model。
      # 仅 embedding-model 由 RagServiceImpl 注入使用。
      embedding-model:
        api-key: ${DASHSCOPE_EMBEDDING_MODEL_API_KEY:}
        model-name: text-embedding-v3
        dimensions: 1024

image-model:
  qwen:
    model-name: qwen-image-2.0-pro
    api-key: ${DASHSCOPE_QWEN_IMAGE_MODEL_API_KEY:}
  wanx:
    model-name: wan2.7-image-pro
    api-key: ${DASHSCOPE_WANX_IMAGE_MODEL_API_KEY:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
  type-handlers-package: com.qingqiu.openagent.typehandler
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.qingqiu.openagent.model.entity

# sa-token
sa-token:
  token-name: authorization
  # 单会话：同一账号重复登录时会顶掉旧 token
  is-concurrent: false
  is-share: false
  # 令牌最长有效期 1 day，单位秒
  timeout: 604800
  # 空闲 3h 后失活重新登录，活跃请求会自动续签
  active-timeout: 10800
  is-log: true
  auto-renew: true
  # cookie 显式配置：同站跨端口 + HTTP 开发环境
  cookie:
    path: /
    secure: false
    http-only: false
    same-site: Lax

document:
  storage:
    base-path: ${DOCUMENT_STORAGE_BASE_PATH:./data/documents}

# Tavily 联网搜索 / 网页抓取
tavily:
  api-key: ${TAVILY_API_KEY:}
  url: ${TAVILY_URL:https://api.tavily.com/search}
  extract-url: ${TAVILY_EXTRACT_URL:https://api.tavily.com/extract}

oss:
  accessKey: ${OSS_ACCESS_KEY:}
  secretKey: ${OSS_SECRET_KEY:}
  bucket: ${OSS_BUCKET:}
  url: ${OSS_URL:}

# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  openapi:
    title: 'OpenAgent API'
    version: v1.0
    description: 'openAgent'
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.qingqiu.openagent.controller