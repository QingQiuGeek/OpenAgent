      timeout: 100
      port: 6379
      jedis:
        pool:
          enabled: true
          max-active: 5
          max-idle: 5
          min-idle: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
  type-handlers-package: com.qingqiu.openagent.typehandler
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.qingqiu.openagent.model.entity

# sa-token
sa-token:
  token-name: authorization
  # 单会话：同一账号重复登录时会顶掉旧 token
  is-concurrent: false
  is-share: false
  # 令牌最长有效期 1 day，单位秒
  timeout: 604800
  # 空闲 3h 后失活重新登录，活跃请求会自动续签
  active-timeout: 10800
  is-log: true
  auto-renew: true
  # cookie 显式配置：同站跨端口 + HTTP 开发环境
  cookie:
    path: /
    secure: false
    http-only: false
    same-site: Lax

document:
  storage:
    base-path: ./data/documents

# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  openapi:
    title: 'OpenAgent API'
    version: v1.0
    description: 'openAgent'
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.qingqiu.openagent.controller