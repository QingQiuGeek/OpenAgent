server:
  port: 8080
spring:
  profiles:
    active: local
  application:
    name: openagent
  servlet:
    multipart:
      # 单文件 5MB；前端会先拦截，这里是兜底
      max-file-size: 5MB
      # 单次请求 30MB（最多 5 个 5MB 附件 + 富表单冗余）
      max-request-size: 30MB
  datasource:
    url: jdbc:postgresql://localhost:5432/openagent?stringtype=unspecified
    driver-class-name: org.postgresql.Driver
  mail:
    host: smtp.qq.com
    port: 465
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
  data:
    redis:
      connect-timeout: 15
      database: 2
      host: 127.0.0.1
      timeout: 100
      port: 6379
      jedis:
        pool:
          enabled: true
          max-active: 5
          max-idle: 5
          min-idle: 0

langchain4j:
  community:
    dashscope:
      embedding-model:
        model-name: text-embedding-v3
        dimensions: 1024

image-model:
  qwen:
    model-name: qwen-image-2.0-pro
  wanx:
    model-name: wan2.7-image-pro

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
  type-handlers-package: com.qingqiu.openagent.typehandler
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.qingqiu.openagent.model.entity

# sa-token
sa-token:
  token-name: authorization
  # 单会话：同一账号重复登录时会顶掉旧 token
  is-concurrent: false
  is-share: false
  # 令牌最长有效期 1 day，单位秒
  timeout: 604800
  # 空闲 3h 后失活重新登录，活跃请求会自动续签
  active-timeout: 10800
  is-log: true
  auto-renew: true
  # cookie 显式配置：同站跨端口 + HTTP 开发环境
  cookie:
    path: /
    secure: false
    http-only: false
    same-site: Lax

document:
  storage:
    base-path: ./data/documents

# Tavily 联网搜索 / 网页抓取
# 优先读取环境变量 TAVILY_API_KEY；本地开发可在 application-local.yaml 中覆盖
tavily:
  api-key: ${TAVILY_API_KEY:}
  url: ${TAVILY_URL:https://api.tavily.com/search}
  extract-url: ${TAVILY_EXTRACT_URL:https://api.tavily.com/extract}

# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  openapi:
    title: 'OpenAgent API'
    version: v1.0
    description: 'openAgent'
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.qingqiu.openagent.controller