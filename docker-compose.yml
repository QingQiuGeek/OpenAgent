services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: openagent-postgres
    restart: unless-stopped
    environment:
      # 先连默认的 postgres 库执行 init，让 openagent.sql 自己 CREATE DATABASE openagent 并切过去建表
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # 容器首次启动时，entrypoint 会按字典序自动执行 /docker-entrypoint-initdb.d 下的 *.sql
      # openagent.sql 自带 CREATE DATABASE / \connect / CREATE EXTENSION vector，直接挂即可
      - ./src/main/resources/openagent.sql:/docker-entrypoint-initdb.d/openagent.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d openagent"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [openagent-net]

  redis:
    image: redis:7-alpine
    container_name: openagent-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [openagent-net]

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: openagent-backend:latest
    container_name: openagent-backend
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openagent?stringtype=unspecified
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # host 在 docker 网络内固定为服务名 redis，不能从 .env 改（否则容器内连不上）
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      SPRING_DATA_REDIS_DATABASE: ${SPRING_DATA_REDIS_DATABASE:-0}
      # 文档存储改到容器持久化卷（覆盖 application.yaml 中的 ./data/documents）
      DOCUMENT_STORAGE_BASE_PATH: /app/data/documents
      # —— LLM / 第三方 API Key（按需）——
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      TAVILY_API_KEY:    ${TAVILY_API_KEY:-}
      # —— JVM 调参 ——
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1024m -XX:+UseG1GC -Dfile.encoding=UTF-8}
    volumes:
      - backend_data:/app/data
    expose:
      - "8080"
    # 若需要直接访问后端，取消下面两行注释
    # ports:
    #   - "8080:8080"
    networks: [openagent-net]

  frontend:
    build:
      context: ./openagent-fronted
      dockerfile: Dockerfile
      args:
        # 留空 → 前端走同源相对路径 → 落到 nginx → 反代 backend
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    image: openagent-frontend:latest
    container_name: openagent-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks: [openagent-net]

networks:
  openagent-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  backend_data:
